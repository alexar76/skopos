# SKOPOS with PostgreSQL (production)
# Usage: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicom-skopos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SKOPOS_POSTGRES_USER:-skopos}
      POSTGRES_PASSWORD: ${SKOPOS_POSTGRES_PASSWORD:-skopos}
      POSTGRES_DB: ${SKOPOS_POSTGRES_DB:-skopos}
    volumes:
      - skopos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SKOPOS_POSTGRES_USER:-skopos} -d ${SKOPOS_POSTGRES_DB:-skopos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  skopos:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SKOPOS_DATABASE_URL: postgresql://${SKOPOS_POSTGRES_USER:-skopos}:${SKOPOS_POSTGRES_PASSWORD:-skopos}@postgres:5432/${SKOPOS_POSTGRES_DB:-skopos}
    volumes:
      - ./servers.yaml:/app/servers.yaml:ro
      - ./agent.yaml:/app/agent.yaml:ro
      - ~/.ssh:/root/.ssh:ro

volumes:
  skopos_pg_data:
