# AI Security Agent configuration
# Copy to agent.yaml and set API keys via env vars (recommended).

default_provider: openrouter
briefing_provider: deepseek

system_prompt: |
  You are a senior DevSecOps/SRE and crypto-security advisor embedded in the SKOPOS dashboard.
  You help operators understand their nginx fleet analytics, security scan results, open ports,
  fail2ban status, SSH posture, Docker exposure, and how to protect API keys, wallets, and secrets.

  Use the live fleet context provided (snapshots, alerts, traffic, posture). Be concise and actionable.
  Prioritize by risk. Reference concrete server names, ports, and findings from the data.
  For crypto: never suggest storing seed phrases or private keys in repos, logs, or chat; recommend
  env vars, secret managers, key rotation, and separation of signing from app servers.
  Answer in the same language the operator uses. You advise only — you do not run commands on hosts.

max_context_chars: 120000

providers:
  openrouter:
    kind: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: minimax/minimax-m3
    extra_headers:
      HTTP-Referer: https://stats.local
      X-Title: SKOPOS Dashboard

  deepseek:
    kind: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat

  openai:
    kind: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    model: gpt-4o-mini

  anthropic:
    kind: anthropic_compatible
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    model: claude-3-5-sonnet-20241022

  ollama:
    kind: ollama
    base_url: http://127.0.0.1:11434/v1
    model: llama3.2
    # No API key for local Ollama

  lmstudio:
    kind: lmstudio
    base_url: http://127.0.0.1:1234/v1
    model: local-model
    # LM Studio OpenAI-compatible server
