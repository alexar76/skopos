<svg xmlns="http://www.w3.org/2000/svg" width="72" height="20" role="img" aria-label="demo: live">
  <title>demo: live</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="72" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="36" height="20" fill="#555"/>
    <rect x="36" width="36" height="20" fill="#4c1"/>
    <rect width="72" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
    <text x="18.0" y="14" fill="#010101" fill-opacity=".3">demo</text>
    <text x="18.0" y="13">demo</text>
    <text x="54.0" y="14" fill="#010101" fill-opacity=".3">live</text>
    <text x="54.0" y="13">live</text>
  </g>
</svg>
